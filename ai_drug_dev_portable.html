</script>

<script>
    let data = null;
    let currentFilter = 'all';

    function switchView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + name).classList.add('active');
        document.getElementById('nav-' + name).classList.add('active');
    }

    function badgeClass(label) {
        if (!label) return '';
        label = label.toLowerCase();
        if (label.includes('target discovery') || label.includes('pre-clinical') || label.includes('phase 0')) return 'ph0';
        if (label.includes('phase i') && !label.includes('ii')) return 'ph1';
        if (label.includes('phase ii') && !label.includes('iii')) return 'ph2';
        if (label.includes('phase iii') || label.includes('post-market') || label.includes('pivotal')) return 'ph3';
        return 'ph1';
    }

    function phaseShort(label) {
        if (!label) return 'N/A';
        if (label.includes('Target Discovery') || label.includes('Target Discovery / Molecular Design')) return 'Ph0 Discovery';
        if (label.includes('Pre-clinical')) return 'Pre-Clinical';
        if (label.includes('Phase I') && !label.includes('II')) return 'Phase I';
        if (label.includes('Phase II') && !label.includes('III')) return 'Phase II';
        if (label.includes('Phase III') || label.includes('Pivotal')) return 'Phase III';
        if (label.includes('Post-Market')) return 'Post-Market';
        return label.substring(0, 14);
    }

    function applyFilter(el) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentFilter = el.dataset.phase;
        renderCompanies();
    }

    function renderHome() {
        const mc = data.metrics_comparison;
        if (mc) {
            document.getElementById('home-metrics').innerHTML = `
                <div class="metric-box">
                    <div class="metric-box-label">傳統開發</div>
                    <div class="metric-box-value">$2.6B+</div>
                    <div class="metric-box-sub">10–15 年 · 成功率 ~10%</div>
                </div>
                <div class="metric-box highlight ai">
                    <div class="metric-box-label">🤖 AI 賦能</div>
                    <div class="metric-box-value">-22%</div>
                    <div class="metric-box-sub">成本節省 · PhI 過率 80-90%</div>
                </div>
            `;
        }
        const stagesEl = document.getElementById('home-stages');
        stagesEl.innerHTML = '';
        (data.value_chain_stats || []).forEach(s => {
            const div = document.createElement('div');
            div.className = 'pipeline-stage';
            div.onclick = () => { applyFilterByPhase(s.phase); switchView('companies'); };
            div.innerHTML = `
                <div class="stage-top">
                    <span class="stage-name">${s.title}</span>
                    <span class="stage-arrow">›</span>
                </div>
                <div class="stage-stats">
                    <span class="stat-item">成本 <strong>${s.cost}</strong></span>
                    <span class="stat-item">時間 <strong>${s.time}</strong></span>
                    <span class="stat-item">成功率 <strong>${s.success_rate}</strong></span>
                </div>
            `;
            stagesEl.appendChild(div);
        });
    }

    function applyFilterByPhase(phase) {
        let key = 'all';
        if (phase.includes('0') || phase.includes('Target')) key = 'Target Discovery';
        else if (phase.toLowerCase().includes('phase i') && !phase.toLowerCase().includes('ii')) key = 'Phase I';
        else if (phase.toLowerCase().includes('phase ii')) key = 'Phase II';
        else if (phase.toLowerCase().includes('phase iii')) key = 'Phase III';
        else if (phase.toLowerCase().includes('post')) key = 'Post-Market';
        document.querySelectorAll('.filter-chip').forEach(c => {
            c.classList.toggle('active', c.dataset.phase === key);
        });
        currentFilter = key;
        renderCompanies();
    }

    function renderCompanies() {
        const el = document.getElementById('company-list');
        el.innerHTML = '';
        let list = data.companies || [];
        if (currentFilter !== 'all') {
            list = list.filter(c => c.phase_label && c.phase_label.toLowerCase().includes(currentFilter.toLowerCase()));
        }
        if (!list.length) {
            el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);">此階段暫無追蹤公司</div>';
            return;
        }
        list.forEach(c => {
            const div = document.createElement('div');
            div.className = 'company-card';
            div.onclick = () => openCompany(c.ticker);
            const epsNum = parseFloat(c.eps);
            const epsCls = isNaN(epsNum) ? 'neu' : (epsNum > 0 ? 'pos' : 'neg');
            div.innerHTML = `
                <div class="company-top">
                    <div>
                        <div class="company-name">${c.name}</div>
                        <div class="company-ticker">${c.exchange}: ${c.ticker}</div>
                        <div class="category-tag" style="margin-top:5px;">${c.category || ''}</div>
                    </div>
                    <div class="company-right">
                        <div class="price-tag">${c.price === 'N/A' ? 'N/A' : '$' + c.price}</div>
                        <span class="badge ${badgeClass(c.phase_label)}">${phaseShort(c.phase_label)}</span>
                    </div>
                </div>
                <div class="company-meta">
                    <div class="meta-item">
                        <span class="meta-label">市值</span>
                        <span class="meta-value">${c.market_cap}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">TTM EPS</span>
                        <span class="meta-value ${epsCls}">${isNaN(epsNum) ? 'N/A' : (epsNum > 0 ? '+' : '') + '$' + Math.abs(epsNum)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">評級</span>
                        <span class="rating-chip">${c.rating}</span>
                    </div>
                </div>
            `;
            el.appendChild(div);
        });
    }

    function openCompany(ticker) {
        const c = (data.companies || []).find(x => x.ticker === ticker);
        if (!c) return;
        document.getElementById('m-name').textContent = c.name;
        document.getElementById('m-ticker').textContent = `${c.exchange}: ${c.ticker}`;
        const badge = document.getElementById('m-badge');
        badge.className = 'badge ' + badgeClass(c.phase_label);
        badge.textContent = phaseShort(c.phase_label);
        document.getElementById('m-category').textContent = c.category || '';
        const dd = c.deep_dive;
        let html = `<div class="detail-section"><div class="detail-section-title">🏢 公司簡介</div><div class="detail-text">${dd.profile}</div></div>`;
        html += `<div class="detail-section"><div class="detail-section-title">🔬 管線里程碑</div>`;
        (dd.pipeline_milestones || []).forEach(p => {
            html += `<div class="milestone-row"><div class="milestone-dot"></div><div><div class="milestone-prog">${p.program}</div><div class="milestone-info">${p.phase} · ${p.milestone}</div><div class="milestone-date">${p.date}</div></div></div>`;
        });
        if (dd.pipeline_link) html += `<div style="text-align:right;margin-top:10px;font-size:0.85em;">${dd.pipeline_link}</div>`;
        html += `</div>`;
        html += `<div class="detail-section"><div class="detail-section-title">📊 5 年 EPS 軌跡</div><div style="display:grid;grid-template-columns:repeat(${(dd.financial_5yr||[]).length},1fr);gap:6px;">`;
        (dd.financial_5yr || []).forEach(f => {
            const cls = f.eps.toString().includes('-') ? 'neg' : 'pos';
            html += `<div style="text-align:center;background:var(--surface2);border-radius:8px;padding:8px 4px;"><div style="font-size:10px;color:var(--muted);">${f.year}</div><div style="font-size:12px;font-weight:700;" class="${cls}">${f.eps}</div></div>`;
        });
        html += `</div>`;
        if (dd.financial_link) html += `<div style="text-align:right;margin-top:10px;font-size:0.85em;">${dd.financial_link}</div>`;
        html += `</div>`;
        html += `<div class="detail-section"><div class="detail-section-title">📅 法說會時程</div><div class="detail-text">${(dd.earnings_dates || []).join(' · ')}</div></div>`;
        html += `<div class="detail-section"><div class="detail-section-title">🤝 重大合作夥伴</div><div>${(dd.partnerships || []).map(p => `<span class="partner-chip">${p}</span>`).join('')}</div></div>`;
        html += `<div class="detail-section"><div class="detail-section-title">⚠️ 風險評估</div><div class="detail-text risk">${dd.risk_assessment}</div></div>`;
        html += `<div class="detail-section"><div class="detail-section-title">✅ 投資策略</div><div class="detail-text strategy">${dd.investment_strategy}</div></div>`;
        document.getElementById('m-body').innerHTML = html;
        document.getElementById('detail-modal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('detail-modal').classList.remove('open');
        document.body.style.overflow = '';
    }

    document.getElementById('detail-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    function renderNews() {
        const el = document.getElementById('news-list');
        el.innerHTML = '';
        (data.news_feed || []).forEach(n => {
            const div = document.createElement('div');
            div.className = 'news-card';
            const chips = (n.companies_impacted || []).map(c => `<span class="company-chip">${c}</span>`).join('');
            const titleHtml = n.url ? `<a href="${n.url}" target="_blank" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${n.title}</a>` : n.title;
            const sourceHtml = n.url ? `<a href="${n.url}" target="_blank" style="color:inherit;text-decoration:underline;">${n.source}</a>` : n.source;
            div.innerHTML = `
                <div class="news-meta-row">
                    <span class="news-date">${n.date}</span>
                    <span class="news-category-badge">${n.category}</span>
                </div>
                <div class="news-title">${titleHtml}</div>
                <div class="news-summary">${n.summary}</div>
                <div style="display:flex;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:4px;">
                    <div style="display:flex;gap:4px;flex-wrap:wrap;">${chips}</div>
                    <div class="news-source">來源: ${sourceHtml}</div>
                </div>
            `;
            el.appendChild(div);
        });
    }

    function renderAudit() {
        const el = document.getElementById('audit-list');
        el.innerHTML = '';
        [...(data.update_history || [])].reverse().forEach(a => {
            const div = document.createElement('div');
            div.className = 'audit-item';
            const dateStr = new Date(a.date).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `
                <div class="audit-time">${dateStr}</div>
                <div class="audit-action">${a.verified ? '✅' : '⚠️'} [${(a.action||'').toUpperCase()}]</div>
                <div class="audit-desc">${a.description}</div>
                <div class="audit-reason">↳ ${a.reason}</div>
            `;
            el.appendChild(div);
        });
    }

    async function init() {
        let dataSource = 'embedded';
        try {
            const r = await fetch('ai_drug_dev_data.json?t=' + Date.now());
            if (!r.ok) throw new Error('fetch failed');
            data = await r.json();
            dataSource = 'live';
        } catch(e) {
            // Fallback: use embedded data
            try {
                const emb = document.getElementById('embedded-data');
                data = JSON.parse(emb.textContent.trim());
                dataSource = 'embedded';
            } catch(e2) {
                document.getElementById('date-badge').textContent = '❌ 數據缺失';
                document.getElementById('date-badge').style.color = '#ef4444';
                return;
            }
        }

        const d = new Date(data.last_updated);
        const dateLabel = d.toLocaleDateString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
        document.getElementById('date-badge').textContent = (dataSource === 'live' ? '🔴 ' : '📦 ') + dateLabel;

        renderHome();
        renderCompanies();
        renderNews();
        renderAudit();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
